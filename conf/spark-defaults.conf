# ============================================
# SPARK DEFAULT CONFIGURATION
# ============================================

# --- Configurações de Rede (CRÍTICO para Docker) ---
spark.driver.host spark-master
spark.driver.bindAddress 0.0.0.0
spark.driver.port 40450
spark.blockManager.port 40451
spark.driver.blockManager.port 40452

# --- Master e Cluster ---
spark.master spark://spark-master:7077

# --- Memória e Recursos ---
spark.executor.memory 1g
spark.executor.cores 2
spark.cores.max 4
spark.driver.memory 1g

# --- Desabilitar Alocação Dinâmica (evita problemas iniciais) ---
spark.dynamicAllocation.enabled false
spark.shuffle.service.enabled false

# --- Configurações de SQL e Warehouse ---
spark.sql.warehouse.dir /opt/spark/warehouse
spark.sql.catalogImplementation hive

# --- Configurações de Log ---
spark.eventLog.enabled true
spark.eventLog.dir /opt/spark/logs
spark.history.fs.logDirectory /opt/spark/logs

# --- Serialização (performance) ---
spark.serializer org.apache.spark.serializer.KryoSerializer

# --- Configurações de Rede Adicionais ---
spark.network.timeout 600s
spark.executor.heartbeatInterval 60s
